name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npx @vscode/vsce package --allow-missing-repository
      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" *.vsix --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --allow-missing-repository
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
